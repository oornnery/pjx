[project]
name = "pjx"
version = "0.0.1"
description = "Server-first component framework prototype for Python"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jinja2>=3.1.6",
    "markupsafe>=3.0.2",
    "starlette>=0.47.3",
    "uvicorn>=0.35.0",
]

[dependency-groups]
dev = [
    "httpx>=0.28.1",
    "pytest>=8.4.1",
]
