name: Release

on:
  release:
    types: [published]

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest src/ -v --tb=short

      - name: Build all packages
        run: |
          uv build --package pjx
          uv build --package pjx-htmx
          uv build --package pjx-stimulus
          uv build --package pjx-tailwind

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
