name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev --frozen

      - name: Ruff format
        run: uv run ruff format . --diff

      - name: Ruff lint
        run: uv run ruff check . --output-format github

      - name: Ty check
        run: uv run ty check --output-format github

      - name: Markdown format
        run: >-
          uv run rumdl fmt README.md AGENTS.md TODO.md docs exemples/README.md
          --check --diff

      - name: Markdown lint
        run: >-
          uv run rumdl check README.md AGENTS.md TODO.md docs exemples/README.md
          --output-format github

      - name: Pytest with coverage
        run: uv run pytest --cov=pjx --cov=exemples --cov-report=term-missing:skip-covered --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
